<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nota do Aluno</title>
    <link rel="stylesheet" href="./css/nota.css">
</head>
<body>
    <main class="container">
        <form>
            <article class="form-control">
                <label for="nota">Digite nota do aluno</label>
                <input type="number" min="0" max="10" id="nota" />
            </article>
            <section id="message">
                <span>Digite a nota</span>
            </section>

            <button id="verifica-nota" onclick="resultadoNotaClick(event)">Verificar nota</button>

            <div id="resultado"></div>
        </form>
    </main>
    
    <script src="./js/nota.js"></script>
</body>
</html>
